name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # node-gyp (used by node-pty) needs Python distutils; Python 3.12+ removed it. Install setuptools to provide it.
      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # electron-builder creates the GitHub release as a DRAFT and uploads .exe + .blockmap
      # + latest.yml to it. It auto-detects pre-release semver suffixes (e.g. v1.2.4-rc.1)
      # and sets prerelease=true on the draft.
      - name: Build and upload assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish onTag

      # Publish the draft created by electron-builder. Branch on the tag style:
      #   - 'v1.3.0' (no hyphen) → published, marked as Latest
      #   - 'v1.3.0-rc.1' / 'v1.3.0-beta.0' (hyphen) → published, marked as pre-release
      #
      # electron-builder does NOT auto-set prerelease=true from the version string when
      # creating a draft — it only flips prerelease when releaseType is "release" or
      # "prerelease". We explicitly set --prerelease here for hyphen-tagged releases so
      # GitHub doesn't promote them to "Latest", and electron-updater clients with
      # default config (allowPrerelease: false) skip them.
      #
      # We DON'T use softprops/action-gh-release: it can't find drafts by tag (drafts
      # aren't bound to a tag until published) and creates a duplicate empty release.
      - name: Publish stable release as Latest
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --latest

      - name: Publish pre-release
        if: ${{ contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --prerelease
