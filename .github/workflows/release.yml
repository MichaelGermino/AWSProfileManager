name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # node-gyp (used by node-pty) needs Python distutils; Python 3.12+ removed it. Install setuptools to provide it.
      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Publish onTag generates latest.yml and uploads exe + yml to the release (required for in-app updater)
      - name: Build and publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish onTag

      # Tag style decides: 'v1.2.4' is a stable release (mark as Latest); anything with
      # a hyphen like 'v1.2.4-rc.1' or 'v1.2.4-beta.0' is a pre-release.
      # electron-builder already auto-detects the semver pre-release suffix and uploads
      # the GitHub release with prerelease=true; we just need to NOT flip "Latest" for
      # pre-release tags. electron-updater clients with default config (allowPrerelease: false)
      # will skip pre-releases on their own.
      - name: Mark stable release as Latest
        if: ${{ !contains(github.ref_name, '-') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Belt-and-suspenders for pre-release tags: explicitly mark prerelease=true and
      # name it consistently, in case electron-builder's auto-detection ever shifts.
      - name: Mark pre-release
        if: ${{ contains(github.ref_name, '-') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pre-release ${{ github.ref_name }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
