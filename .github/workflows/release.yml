name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # node-gyp (used by node-pty) needs Python distutils; Python 3.12+ removed it. Install setuptools to provide it.
      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # electron-builder creates the GitHub release as a DRAFT and uploads .exe + .blockmap
      # + latest.yml to it. It auto-detects pre-release semver suffixes (e.g. v1.2.4-rc.1)
      # and sets prerelease=true on the draft.
      - name: Build and upload assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish onTag

      # Publish the draft so users (and electron-updater) can see it. We DON'T use
      # softprops/action-gh-release for this — it can't find drafts by tag (drafts aren't
      # bound to a tag until published) and ends up creating a duplicate empty release.
      # `gh release edit --draft=false` flips the existing draft in place, preserving
      # the prerelease flag electron-builder already set from the version string.
      #
      # After publishing, GitHub automatically promotes non-prerelease releases to "Latest"
      # by default, so we don't need an explicit make_latest step.
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false
